{% extends 'app/base.html' %}
{% block title %}Delete Transaction - Expense Tracker{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body text-center">
                <h3 class="card-title mb-3">Delete transaction</h3>
                <p>Are you sure you want to delete this transaction?</p>
                <p><strong>{{ transaction.category.name }} — ₹{{ transaction.amount }}</strong></p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger me-2">Delete</button>
                    <a class="btn btn-secondary" href="{% url 'transaction_list' %}">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
